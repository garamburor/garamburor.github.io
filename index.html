<!DOCTYPE html>
<html lang="en">
<link rel="stylesheet" type="text/css" href="styles.css">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Load p5.js libs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.8.0/p5.js"></script>
    <!-- Website title -->
    <title>Guillermo A. R.</title>
    <!-- Favicon -->
    <link rel="apple-touch-icon" href="media/logo.png" sizes="any" type="image/png">
    <link rel="icon" href="media/logo.png" type="image/svg">
    <style>
        /* Essential to make the component actually fill the screen */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevents accidental scrollbars */
        }
    </style>
    <!-- Handle URLs -->
    <script type="text/javascript">
    (function(l) {
        if (l.search[1] === '/' ) {
        var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
        }).join('?');
        window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash );
        }
    }(window.location))
    </script>
</head>

<body>
    <main-app></main-app>
    <script src="main.js" type="module"></script>
</body>
</html>
